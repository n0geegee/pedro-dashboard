<?xml version="1.0" encoding="UTF-8"?>
<!-- Hermes Oracle — panel background texture (tileable). 512×512. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="t-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1815"/>
      <stop offset="100%" stop-color="#020504"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" fill="url(#t-base)"/>
  <!-- Faint diagonal hatching -->
  <g stroke="rgba(184,155,79,0.05)" stroke-width="0.6">
    <line x1="-128" y1="0" x2="640" y2="768"/>
    <line x1="-128" y1="64" x2="640" y2="832"/>
    <line x1="-128" y1="-64" x2="640" y2="704"/>
    <line x1="-128" y1="128" x2="640" y2="896"/>
  </g>
  <!-- Random specks (very subtle) -->
  <g fill="rgba(67,240,181,0.06)">
    <circle cx="60" cy="80" r="1.2"/>
    <circle cx="220" cy="140" r="0.9"/>
    <circle cx="380" cy="50" r="1.1"/>
    <circle cx="100" cy="320" r="0.8"/>
    <circle cx="320" cy="260" r="1.0"/>
    <circle cx="460" cy="380" r="1.3"/>
    <circle cx="180" cy="440" r="0.9"/>
    <circle cx="40" cy="200" r="0.7"/>
    <circle cx="280" cy="420" r="1.0"/>
    <circle cx="420" cy="120" r="0.8"/>
  </g>
</svg>
